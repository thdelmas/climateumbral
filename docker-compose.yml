services:
  # One-shot: fetch the grid from Copernicus if data/ is empty.
  # (The repo ships tooling, not data — see tools/fetch_grid.py.)
  fetch:
    image: python:3.12-slim
    volumes:
      - ./tools:/tools:ro
      - ./data:/data
    command: >
      sh -c "test -f /data/bcn.raw
      || python3 /tools/fetch_grid.py 2.14 41.375 2.19 41.41 -o /data/bcn"

  api:
    build: ./server
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    command: /usr/local/bin/tilewhip-server -addr :8080 -data /data
    depends_on:
      fetch:
        condition: service_completed_successfully

  web:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
    environment:
      API_PROXY: http://api:8080
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api
