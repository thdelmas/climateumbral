services:
  # V3: no local grid — the server streams values from the EEA image
  # service on demand. data/ only holds the claims ledger.
  # Everything runs as uid 1000 so bind-mounted files stay owned by
  # the host user, and ports bind loopback only: a dev stack is not
  # a LAN service.
  api:
    build: ./server
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/data
    command: /usr/local/bin/climateumbral-server -addr :8080 -data /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional analysis helper: fetch a static grid for any EU bbox
  # (tools/fetch_grid.py); not needed to run the game.
  fetch:
    image: python:3.12-slim
    profiles: ["tools"]
    user: "1000:1000"
    volumes:
      - ./tools:/tools:ro
      - ./data:/data
    command: >
      sh -c "test -f /data/bcn.raw
      || python3 /tools/fetch_grid.py 2.14 41.375 2.19 41.41 -o /data/bcn"

  web:
    image: node:22-alpine
    working_dir: /app
    user: node
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./web:/app
    environment:
      API_PROXY: http://api:8080
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    depends_on:
      - api
