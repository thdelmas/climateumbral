# Production stack: one app container (Go API serving the built SPA)
# behind Caddy for TLS. Run from the repo root:
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
services:
  api:
    build: ..
    command: >
      climateumbral-server -addr :8080 -data /data -dist /srv/dist
      -trust-proxy
    volumes:
      - ../data:/data
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    mem_limit: 128m
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
